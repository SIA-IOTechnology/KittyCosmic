<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - KittySploit</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/os.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/marketplace.css') }}">
</head>

<body>
    <div class="marketplace-container">
        <!-- Header -->
        <header class="marketplace-header">
            <div class="header-content">
                <h1><ion-icon name="storefront-outline"></ion-icon> Marketplace</h1>
                <div class="header-actions">
                    <div id="account-status" class="account-status">
                        <span id="account-info">Not logged in</span>
                        <button id="login-btn" class="btn btn-primary">Login</button>
                        <button id="logout-btn" class="btn btn-secondary" style="display: none;">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="marketplace-main">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="installed">
                    <ion-icon name="cube-outline"></ion-icon> Installed
                </button>
                <button class="tab-btn" data-tab="browse">
                    <ion-icon name="search-outline"></ion-icon> Browse
                </button>
            </div>

            <!-- Installed Tab -->
            <div id="installed-tab" class="tab-content active">
                <div class="section-header">
                    <h2>Installed Modules</h2>
                    <button id="refresh-installed" class="btn btn-icon" title="Refresh">
                        <ion-icon name="refresh-outline"></ion-icon>
                    </button>
                </div>
                <div id="installed-list" class="modules-list">
                    <div class="loading">Loading installed modules...</div>
                </div>
            </div>

            <!-- Browse Tab -->
            <div id="browse-tab" class="tab-content">
                <div class="section-header">
                    <div class="search-box">
                        <ion-icon name="search-outline"></ion-icon>
                        <input type="text" id="search-input" placeholder="Search modules...">
                        <button id="search-btn" class="btn btn-primary">Search</button>
                    </div>
                </div>
                <div id="browse-list" class="modules-list">
                    <div class="loading">Loading marketplace modules...</div>
                </div>
                <div id="pagination" class="pagination" style="display: none;">
                    <button id="prev-page" class="btn btn-secondary">Previous</button>
                    <span id="page-info">Page 1</span>
                    <button id="next-page" class="btn btn-secondary">Next</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Marketplace Login</h2>
                <button class="modal-close" onclick="closeModal('login-modal')">
                    <ion-icon name="close-outline"></ion-icon>
                </button>
            </div>
            <div class="modal-body">
                <div id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <div class="form-actions">
                        <button id="login-submit" class="btn btn-primary">Login</button>
                        <button id="show-register" class="btn btn-link">Don't have an account? Register</button>
                    </div>
                </div>
                <div id="register-form" style="display: none;">
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input type="text" id="register-username" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password-confirm">Confirm Password</label>
                        <input type="password" id="register-password-confirm" required>
                    </div>
                    <div class="form-actions">
                        <button id="register-submit" class="btn btn-primary">Register</button>
                        <button id="show-login" class="btn btn-link">Already have an account? Login</button>
                    </div>
                </div>
                <div id="auth-message" class="message"></div>
            </div>
        </div>
    </div>

    <!-- Module Info Modal -->
    <div id="module-modal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="module-modal-title">Module Information</h2>
                <button class="modal-close" onclick="closeModal('module-modal')">
                    <ion-icon name="close-outline"></ion-icon>
                </button>
            </div>
            <div class="modal-body">
                <div id="module-info-content"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/marketplace.js') }}"></script>
</body>

</html>
